name: Build MF Screener dataset

# Runs the heavy compute on GitHub Actions (free + unlimited for public repos,
# 6h job limit) — NOT on Vercel, whose Hobby functions are too short for the
# ~60 bulk fetches. The job upserts results into Postgres; Vercel just reads.

on:
  schedule:
    - cron: "30 2 * * *"     # ~08:00 IST daily (AMFI publishes NAVs by night)
  workflow_dispatch: {}        # allow manual run from the Actions tab

# Avoid overlapping runs
concurrency:
  group: screener
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install pg@8

      - name: Build + upsert screener dataset
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}   # add in repo Settings → Secrets → Actions
          MONTHS: "60"
        run: node scripts/build-screener.mjs

      # Optional artifact for debugging / a static fallback
      - name: Upload JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screener-json
          path: data/screener.json
          retention-days: 7
          if-no-files-found: ignore

      # Funds where mfapi.in oldest NAV >> 10 (pre-AMFI-records) — add overrides
      # to data/mf-inception-overrides.json to get accurate since-inception returns
      - name: Upload inception needs-review list
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mf-inception-needs-review
          path: data/mf-inception-needs-review.json
          retention-days: 30
          if-no-files-found: ignore
