name: market-breadth

# Nightly: pull the day's BSE bhavcopy into stock_eod, then compute the breadth snapshot,
# per-stock signals, and sector breadth. Manual backfill via from/to inputs.
on:
  schedule:
    - cron: '30 12 * * 1-5'   # 12:30 UTC = 18:00 IST, weekdays (after BSE bhavcopy is published)
  workflow_dispatch:
    inputs:
      from:
        description: 'Backfill start date (YYYY-MM-DD) — leave blank for latest day only'
        required: false
      to:
        description: 'Backfill end date (YYYY-MM-DD)'
        required: false

concurrency:
  group: market-breadth
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install pg@8 --no-save
      - name: Ingest EOD prices
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: |
          if [ -n "${{ github.event.inputs.from }}" ]; then
            node scripts/ingest-eod.mjs --from=${{ github.event.inputs.from }} --to=${{ github.event.inputs.to }}
          else
            node scripts/ingest-eod.mjs
          fi
      - name: Compute breadth snapshot
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: |
          if [ -n "${{ github.event.inputs.from }}" ]; then
            node scripts/build-breadth.mjs --all
          else
            node scripts/build-breadth.mjs
          fi
      - name: Compute per-stock signals
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: |
          if [ -n "${{ github.event.inputs.from }}" ]; then
            node scripts/build-signals.mjs --all
          else
            node scripts/build-signals.mjs
          fi
      - name: Compute sector breadth
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: |
          if [ -n "${{ github.event.inputs.from }}" ]; then
            node scripts/build-sector-breadth.mjs --all
          else
            node scripts/build-sector-breadth.mjs
          fi
